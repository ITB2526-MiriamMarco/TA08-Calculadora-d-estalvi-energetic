<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITB Infrastructure Audit | Final 8-Metric Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

    <div class="wrapper">
        <header>
            <div class="logo-area">
                <h1>ITB <span class="green-tech">System</span>Audit</h1>
                <p>Infrastructure Resource Management | Double Shift Analysis</p>
            </div>
            <div class="status-badge">
                <span class="dot"></span> Nodes: 627 | Pax: 1600
            </div>
        </header>

        <section class="config-bar">
            <div class="input-field">
                <label for="pcCount">Nodes (PCs)</label>
                <input type="number" id="pcCount" value="627" min="0" onchange="runCalculations()">
            </div>
            <div class="input-field">
                <label for="studentCount">Daily Pax (AM+PM)</label>
                <input type="number" id="studentCount" value="1600" min="0" onchange="runCalculations()">
            </div>
            <div class="input-field">
                <label for="calcMode">Period</label>
                <select id="calcMode" onchange="runCalculations()">
                    <option value="175">Academic Period</option>
                    <option value="365">Full Fiscal Year</option>
                </select>
            </div>
        </section>

        <main class="dashboard-grid" id="resultsGrid">
            </main>

        <section class="strategy-panel">
            <div class="strategy-info">
                <h3>Decision Support System</h3>
                <p>Pulsa los botones en las tarjetas de Agua, Energía o Costes para aplicar medidas de optimización.</p>
            </div>
            <div class="strategy-buttons">
                <button class="btn-primary" onclick="resetSavings()">Reiniciar Simulación</button>
                <button class="btn-outline" onclick="exportToPDF()">Exportar PDF</button>
            </div>
        </section>

        <footer>
            <p>&copy; 2026 ITB - ASIX Project | 8-Metric Technical Audit</p>
        </footer>
    </div>

    <script src="js/matrix_effects.js"></script>
</body>
</html>
