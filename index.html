<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITB Infrastructure Audit | Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <div class="wrapper">
        <header>
            <div class="logo-area">
                <h1>ITB <span class="green-tech">System</span>Audit</h1>
                <p>Análisis de Sostenibilidad Operativa | Infraestructura ASIX</p>
            </div>
            <div class="status-badge">
                <span class="dot"></span> Modo Auditoría Activo
            </div>
        </header>

        <section class="config-bar">
            <div class="input-field">
                <label for="pcCount">Nodos de Red (PCs)</label>
                <input type="number" id="pcCount" value="627" min="0" onchange="runCalculations()">
            </div>
            <div class="input-field">
                <label for="studentCount">Ocupación Diaria (Alumnos)</label>
                <input type="number" id="studentCount" value="1600" min="0" onchange="runCalculations()">
            </div>
            <div class="input-field">
                <label for="calcMode">Periodo de Análisis / Mes</label>
                <select id="calcMode" onchange="runCalculations()">
                    <option value="175">Curso Completo (175 días)</option>
                    <option value="365">Año Fiscal (365 días)</option>
                    <option value="20">Enero </option>
                    <option value="18">Febrero </option>
                    <option value="15">Marzo </option>
                    <option value="21">Abril </option>
                    <option value="20">Mayo </option>
                    <option value="15">Junio </option>
                    <option value="0">Julio </option>
                    <option value="0">Agosto </option>
                    <option value="20">Septiembre </option>
                    <option value="21">Octubre </option>
                    <option value="19">Noviembre </option>
                    <option value="12">Diciembre </option>
                </select>
            </div>
        </section>

        <main class="dashboard-grid" id="resultsGrid"></main>

        <section class="chart-container-wrapper">
            <h2>Proyección de Tendencia Energética (Próximos 3 Años)</h2>
            <div class="chart-box">
                <canvas id="forecastChart"></canvas>
            </div>
        </section>

        <section class="financial-summary">
            <h2>Impacto Financiero Estimado</h2>
            <div class="summary-container">
                <div class="summary-item">
                    <span class="label">Línea Base Inicial</span>
                    <span id="totalBase" class="value">0€</span>
                </div>
                <div class="summary-item">
                    <span class="label">Objetivo Estratégico (-30%)</span>
                    <span id="totalTarget" class="value goal">0€</span>
                </div>
                <div class="summary-item highlighted">
                    <span class="label">Actual con Políticas</span>
                    <span id="totalCurrent" class="value">0€</span>
                </div>
            </div>
            <div class="efficiency-wrapper" style="margin-top: 20px;">
                <div class="efficiency-bar-container" style="background: #333; height: 10px; border-radius: 5px; overflow: hidden;">
                    <div id="efficiencyBar" class="efficiency-bar" style="background: #22c55e; height: 100%; width: 0%; transition: width 0.5s;"></div>
                </div>
                <p id="efficiencyText" style="font-size: 0.8rem; color: #888; margin-top: 5px; text-align: right;">0% logrado</p>
            </div>
        </section>

        <section class="strategy-panel">
            <div class="strategy-buttons">
                <button class="btn-primary" onclick="resetSavings()">Reiniciar Políticas</button>
                <button class="btn-outline" onclick="window.print()">Exportar PDF</button>
            </div>
        </section>

        <footer>
            <p>&copy; <span id="currentYearDisplay"></span> ITB - Proyecto ASIX</p>
        </footer>
    </div>

    <script src="js/matrix_effects.js"></script>
</body>
</html>
